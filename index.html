<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script type="text/javascript" src="scripts.js" defer></script>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div class="calculator">
      <div class="row">
        <input type="text" id="display" value="0" inputmode="decimal">
      </div>
      <div class="row">
        <button id="digit">7</button>
        <button id="digit">8</button>
        <button id="digit">9</button>
        <button id="operator">*</button>

      </div>
      <div class="row">
        <button id="digit">4</button>
        <button id="digit">5</button>
        <button id="digit">6</button>
        <button id="operator">-</button>

      </div>
      <div class="row">
        <button id="digit">1</button>
        <button id="digit">2</button>
        <button id="digit">3</button>
        <button id="operator">+</button>
      </div>
      <div class="row">
        <button id="digit">0</button>
        <button id="point">.</button>
        <button id="operator">÷</button>
        <button id="equals">=</button>
      </div>
      <div class="row">
        <button id="clear">CLEAR</button>
        <button id="delete">DEL</button>
      </div>
    </div>
  </body>
</html>
